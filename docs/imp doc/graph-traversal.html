<style>

  .main { display: flex; height: calc(100vh - 44px); }

  .sidebar { width: 270px; min-width: 270px; border-right: 1px solid #e5e7eb; overflow-y: auto; background: #fafbfc; }
  .sidebar-title { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; padding: 14px 16px 8px; }
  .scenario-btn { display: block; width: 100%; text-align: left; padding: 10px 16px; border: none; background: none; cursor: pointer; border-bottom: 1px solid #f0f1f3; transition: background 0.15s; }
  .scenario-btn:hover { background: #f0f4ff; }
  .scenario-btn.active { background: #eff6ff; border-left: 3px solid #3b82f6; }
  .scenario-btn .sc-agent { font-size: 9px; font-weight: 700; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
  .scenario-btn .sc-title { font-size: 11px; font-weight: 600; color: #1a1a2e; margin-bottom: 2px; }
  .scenario-btn .sc-desc { font-size: 9px; color: #6b7280; line-height: 1.4; }

  .graph-area { flex: 1; position: relative; overflow: hidden; background: #fdfdfe; }
  .graph-canvas { width: 100%; height: 100%; }
  .graph-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; color: #d1d5db; pointer-events: none; text-align: center; line-height: 1.6; }
  .graph-hint.hidden { display: none; }
  .graph-stats { position: absolute; bottom: 10px; left: 12px; font-size: 9px; color: #b0b8c4; }

  .narrative { width: 300px; min-width: 300px; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; }
  .narr-header { padding: 12px 16px 10px; border-bottom: 1px solid #e5e7eb; }
  .narr-header h2 { font-size: 13px; font-weight: 700; line-height: 1.3; }
  .narr-header .narr-agent { font-size: 10px; color: #7c3aed; font-weight: 600; margin-bottom: 2px; }
  .narr-steps { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .narr-step { padding: 8px 10px; margin-bottom: 6px; border-radius: 7px; border: 1px solid #e5e7eb; background: #fafbfc; opacity: 0.25; transition: opacity 0.4s, background 0.4s, border-color 0.4s; }
  .narr-step.active { opacity: 1; background: #eff6ff; border-color: #93c5fd; }
  .narr-step.done { opacity: 0.65; background: #f0fdf4; border-color: #86efac; }
  .narr-step .step-num { font-size: 8px; font-weight: 700; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
  .narr-step.done .step-num { color: #16a34a; }
  .narr-step .step-label { font-size: 10px; font-weight: 600; color: #1a1a2e; margin-bottom: 1px; }
  .narr-step .step-detail { font-size: 9px; color: #4b5563; line-height: 1.4; }
  .narr-step .step-insight { font-size: 9px; color: #7c3aed; font-weight: 600; margin-top: 3px; }

  .controls { padding: 10px 14px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; align-items: center; }
  .ctrl-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; font-size: 10px; font-weight: 600; transition: all 0.15s; }
  .ctrl-btn:hover { background: #f3f4f6; }
  .ctrl-btn.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .ctrl-btn.primary:hover { background: #2563eb; }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .speed-label { font-size: 9px; color: #9ca3af; margin-left: auto; }

  .result-card { margin: 6px 14px 10px; padding: 10px; border-radius: 7px; background: #faf5ff; border: 1.5px solid #c4b5fd; display: none; }
  .result-card.visible { display: block; }
  .result-card h4 { font-size: 10px; font-weight: 700; color: #7c3aed; margin-bottom: 3px; }
  .result-card p { font-size: 10px; color: #374151; line-height: 1.45; white-space: pre-line; }

const nodeColors = {

  finding:   { bg:'#fef2f2', border:'#f87171', text:'#991b1b' },

// ══════════════════════════════════════════════════════
// RENDERER
// ══════════════════════════════════════════════════════

const canvas_el = document.getElementById('graphCanvas');
const ctx = canvas_el.getContext('2d');
let currentScenario = null;
let currentStep = -1;
let animating = false;
let pulsePhase = 0;
let highlightedNodes = new Set();
let highlightedEdges = new Set();
let pulsingEdges = new Set();
let relevantNodes = new Set();
let relevantEdges = new Set();
let rafId = null;

function resizeCanvas() {
  const area = canvas_el.parentElement;
  const dpr = window.devicePixelRatio || 1;
  canvas_el.width = area.clientWidth * dpr;
  canvas_el.height = area.clientHeight * dpr;
  canvas_el.style.width = area.clientWidth + 'px';
  canvas_el.style.height = area.clientHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}

function getPos(node) {
  const area = canvas_el.parentElement;
  return { x: node.x * area.clientWidth, y: node.y * area.clientHeight };
}

function nodeById(id) { return masterNodes.find(n => n.id === id); }

function render() {
  const area = canvas_el.parentElement;
  const W = area.clientWidth, H = area.clientHeight;
  ctx.clearRect(0, 0, W, H);
  pulsePhase = (pulsePhase + 0.018) % 1;

  // ── Draw ALL edges ──
  masterEdges.forEach((e, idx) => {
    const fn = nodeById(e.from), tn = nodeById(e.to);
    if (!fn || !tn) return;
    const a = getPos(fn), b = getPos(tn);

    const isHighlighted = highlightedEdges.has(idx);
    const isRelevant = relevantEdges.has(idx);
    const isPulsing = pulsingEdges.has(idx);

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);

    if (isHighlighted) {
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 2;
    } else if (isRelevant) {
      ctx.strokeStyle = 'rgba(130,145,170,0.5)';
      ctx.lineWidth = 1;
    } else {
      ctx.strokeStyle = 'rgba(180,190,205,0.55)';
      ctx.lineWidth = 0.8;
    }
    ctx.stroke();

    // Arrow
    const len = Math.sqrt((b.x-a.x)**2 + (b.y-a.y)**2);
    if (len < 10) return;
    const dx = (b.x-a.x)/len, dy = (b.y-a.y)/len;
    const tipX = b.x - dx*24, tipY = b.y - dy*24;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX-dx*6+dy*3, tipY-dy*6-dx*3);
    ctx.lineTo(tipX-dx*6-dy*3, tipY-dy*6+dx*3);
    ctx.closePath();
    ctx.fillStyle = isHighlighted ? '#3b82f6' : isRelevant ? 'rgba(130,145,170,0.5)' : 'rgba(180,190,205,0.55)';
    ctx.fill();

    // Edge label (only if highlighted)
    if (isHighlighted) {
      const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
      const angle = Math.atan2(b.y-a.y, b.x-a.x);
      ctx.font = '8px -apple-system, sans-serif';
      ctx.fillStyle = '#3b82f6';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, mx + Math.sin(angle)*10, my - Math.cos(angle)*10);
    }

    // Pulse particles
    if (isPulsing) {
      for (let i = 0; i < 3; i++) {
        const pt = ((pulsePhase * 2.5 + i * 0.33) % 1);
        const px = a.x + (b.x-a.x)*pt, py = a.y + (b.y-a.y)*pt;
        ctx.beginPath();
        ctx.arc(px, py, 3.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(59,130,246,${0.85 - pt*0.5})`;
        ctx.fill();
      }
    }
  });

  // ── Draw ALL nodes ──
  masterNodes.forEach(n => {
    const pos = getPos(n);
    const c = nodeColors[n.type] || nodeColors.asset;
    const isActive = highlightedNodes.has(n.id);
    const isRelevant_ = relevantNodes.has(n.id);
    const r = isActive ? 22 : 18;

    // Glow
    if (isActive) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + 10, 0, Math.PI*2);
      const glow = ctx.createRadialGradient(pos.x, pos.y, r, pos.x, pos.y, r+12);
      glow.addColorStop(0, 'rgba(59,130,246,0.2)');
      glow.addColorStop(1, 'rgba(59,130,246,0)');
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI*2);
    if (isActive) {
      ctx.fillStyle = c.bg;
      ctx.strokeStyle = c.border;
      ctx.lineWidth = 2.5;
    } else if (isRelevant_) {
      ctx.fillStyle = c.bg;
      ctx.strokeStyle = c.border;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
    } else {
      ctx.fillStyle = c.bg;
      ctx.strokeStyle = c.border;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.55;
    }
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Type label inside node
    ctx.font = `bold 7px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    if (isActive) {
      ctx.fillStyle = c.text;
    } else if (isRelevant_) {
      ctx.fillStyle = `rgba(${hexToRgb(c.text)},0.5)`;
    } else {
      ctx.fillStyle = `rgba(${hexToRgb(c.text)},0.4)`;
    }
    ctx.fillText(n.type.toUpperCase(), pos.x, pos.y + 2);

    // Labels below
    if (isActive) {
      ctx.font = 'bold 9px -apple-system, sans-serif';
      ctx.fillStyle = c.text;
      ctx.textAlign = 'center';
      ctx.fillText(n.label, pos.x, pos.y + r + 12);
      ctx.font = '7px -apple-system, sans-serif';
      ctx.fillStyle = '#6b7280';
      ctx.fillText(n.sub, pos.x, pos.y + r + 22);
    } else if (isRelevant_) {
      ctx.font = '8px -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(75,85,99,0.55)';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, pos.x, pos.y + r + 11);
    } else {
      ctx.font = '7px -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(156,163,175,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, pos.x, pos.y + r + 11);
    }
  });

  if (pulsingEdges.size > 0 || animating) {
    rafId = requestAnimationFrame(render);
  }
}

function hexToRgb(hex) {
  const c = hex.replace('#','');
  const r = parseInt(c.substring(0,2),16);
  const g = parseInt(c.substring(2,4),16);
  const b = parseInt(c.substring(4,6),16);
  return `${r},${g},${b}`;
}

// ══════════════════════════════════════════════════════
// SCENARIO UI
// ══════════════════════════════════════════════════════

function buildSidebar() {
  const list = document.getElementById('scenarioList');
  scenarios.forEach((sc, i) => {
    const btn = document.createElement('button');
    btn.className = 'scenario-btn';
    btn.innerHTML = `<div class="sc-agent">${sc.agent}</div><div class="sc-title">${sc.title}</div><div class="sc-desc">${sc.desc}</div>`;
    btn.addEventListener('click', () => loadScenario(i));
    list.appendChild(btn);
  });
}

function loadScenario(idx) {
  cancelAnimationFrame(rafId);
  const sc = scenarios[idx];
  currentScenario = sc;
  currentStep = -1;
  animating = false;

  highlightedNodes = new Set();
  highlightedEdges = new Set();
  pulsingEdges = new Set();
  relevantNodes = new Set(sc.relevantNodes);
  relevantEdges = new Set(sc.relevantEdges);

  document.querySelectorAll('.scenario-btn').forEach((b, i) => b.classList.toggle('active', i === idx));

  document.getElementById('narrAgent').textContent = sc.agent;
  document.getElementById('narrTitle').textContent = sc.title;
  document.getElementById('graphHint').classList.add('hidden');

  const stepsEl = document.getElementById('narrSteps');
  stepsEl.innerHTML = '';
  sc.steps.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'narr-step';
    div.id = 'step-' + i;
    div.innerHTML = `<div class="step-num">Step ${i+1}</div><div class="step-label">${s.label}</div><div class="step-detail">${s.detail}</div>${s.insight ? `<div class="step-insight">${s.insight}</div>` : ''}`;
    stepsEl.appendChild(div);
  });

  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnReset').disabled = false;

  render();
}

function playTraversal() {
  if (!currentScenario || animating) return;
  animating = true;
  document.getElementById('btnPlay').disabled = true;
  currentStep = -1;
  highlightedNodes = new Set();
  highlightedEdges = new Set();
  pulsingEdges = new Set();
  document.getElementById('resultCard').classList.remove('visible');
  document.querySelectorAll('.narr-step').forEach(s => s.classList.remove('active','done'));

  function nextStep() {
    currentStep++;
    if (currentStep >= currentScenario.steps.length) {
      animating = false;
      pulsingEdges = new Set();
      render();
      const rc = document.getElementById('resultCard');
      document.getElementById('resultTitle').textContent = currentScenario.result.title;
      document.getElementById('resultBody').textContent = currentScenario.result.body;
      rc.classList.add('visible');
      document.getElementById('btnPlay').disabled = false;
      return;
    }

    const step = currentScenario.steps[currentStep];

    if (currentStep > 0) {
      const prev = document.getElementById('step-'+(currentStep-1));
      if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
    }

    const stepEl = document.getElementById('step-'+currentStep);
    if (stepEl) { stepEl.classList.add('active'); stepEl.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

    step.highlight.forEach(id => highlightedNodes.add(id));

    // Compute highlighted edges: all edges between any two highlighted nodes that are in relevantEdges
    highlightedEdges = new Set();
    masterEdges.forEach((e, idx) => {
      if (relevantEdges.has(idx) && highlightedNodes.has(e.from) && highlightedNodes.has(e.to)) {
        highlightedEdges.add(idx);
      }
    });

    pulsingEdges = new Set(step.pulseEdges);
    render();

    setTimeout(nextStep, 2200);
  }

  nextStep();
}

function resetScenario() {
  if (!currentScenario) return;
  cancelAnimationFrame(rafId);
  animating = false;
  currentStep = -1;
  highlightedNodes = new Set();
  highlightedEdges = new Set();
  pulsingEdges = new Set();
  document.querySelectorAll('.narr-step').forEach(s => s.classList.remove('active','done'));
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('btnPlay').disabled = false;
  render();
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════

buildSidebar();
document.getElementById('btnPlay').addEventListener('click', playTraversal);
document.getElementById('btnReset').addEventListener('click', resetScenario);
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Draw ghost graph on load
render();
</script>
